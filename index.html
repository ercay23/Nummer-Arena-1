<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Number Arena</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>NUMBER ARENA</h1>

<div id="ops">
    <button onclick="setOp('+')">+</button>
    <button onclick="setOp('-')">-</button>
    <button onclick="setOp('*')">×</button>
    <button onclick="setOp('/')">÷</button>
</div>

<h2>Main Pool</h2>
<div id="balls"></div>

<h2>Results</h2>
<div id="results"></div>

<script src="script.js"></script>

</body>
</html>
