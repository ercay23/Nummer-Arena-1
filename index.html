<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Number Arena Step Builder</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(180deg,#0b1220,#111827);
    color:white;
    text-align:center;
}

h1{color:#00e5ff;}

.container{padding:15px;}

.card{
    display:inline-block;
    padding:15px;
    margin:5px;
    background:#1f2937;
    border-radius:10px;
    font-size:20px;
    cursor:pointer;
    min-width:50px;
}

.card:hover{transform:scale(1.1);}

.btn{
    padding:10px;
    margin:5px;
    background:#00e5ff;
    border:none;
    cursor:pointer;
    font-size:16px;
}

.op{
    padding:10px;
    margin:3px;
    background:#374151;
    border:none;
    color:white;
    cursor:pointer;
}

.selected{
    background:#00e5ff;
    color:black;
}

#log{
    margin-top:20px;
    text-align:left;
    max-width:400px;
    margin-left:auto;
    margin-right:auto;
    background:#0f172a;
    padding:10px;
    border-radius:10px;
}

.step{
    padding:5px;
    border-bottom:1px solid #334155;
}
</style>
</head>

<body>

<h1>NUMBER ARENA ⚡</h1>

<div class="container">

<h2>HEDEF: <span id="target"></span></h2>

<div id="numbers"></div>

<br>

<div>
<button class="op" onclick="setOp('+')">+</button>
<button class="op" onclick="setOp('-')">-</button>
<button class="op" onclick="setOp('*')">×</button>
<button class="op" onclick="setOp('/')">÷</button>
</div>

<br>

<button class="btn" onclick="buildStep()">EKLE</button>
<button class="btn" onclick="check()">BİTİR</button>
<button class="btn" onclick="newRound()">YENİ TUR</button>

<h3>Geçici: <span id="current">0</span></h3>

<div id="log"></div>

</div>

<script>

let nums=[];
let selected=null;
let op=null;
let current=0;
let target=0;
let steps=[];

function randomSmall(){
    return Math.floor(Math.random()*9)+1;
}

function randomBig(){
    let arr=[];
    for(let i=25;i<=100;i+=5) arr.push(i);
    return arr[Math.floor(Math.random()*arr.length)];
}

function newRound(){

    nums=[];
    for(let i=0;i<5;i++) nums.push(randomSmall());
    nums.push(randomBig());

    target=Math.floor(Math.random()*900)+100;

    document.getElementById("target").innerText=target;

    let box=document.getElementById("numbers");
    box.innerHTML="";

    nums.forEach(n=>{
        let d=document.createElement("div");
        d.className="card";
        d.innerText=n;

        d.onclick=()=>{
            selected=n;
        };

        box.appendChild(d);
    });

    steps=[];
    current=0;
    document.getElementById("current").innerText=0;
    document.getElementById("log").innerHTML="";
}

function setOp(o){
    op=o;
}

function buildStep(){

    if(selected===null || op===null) return;

    if(current===0){
        current = selected;
    }else{

        if(op=='+') current += selected;
        if(op=='-') current -= selected;
        if(op=='*') current *= selected;
        if(op=='/') current /= selected;
    }

    steps.push(current);

    document.getElementById("current").innerText=current;

    let div=document.createElement("div");
    div.className="step";
    div.innerText=current;
    document.getElementById("log").appendChild(div);

    selected=null;
    op=null;
}

function check(){

    let diff=Math.abs(target-current);

    let score=0;

    if(diff==0) score=20;
    else if(diff==1) score=10;
    else if(diff==2) score=5;

    alert("Final: "+current+" | Fark: "+diff+" | Puan: "+score);
}

newRound();

</script>

</body>
</html>
