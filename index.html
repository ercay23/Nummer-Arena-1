<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Number Arena Ultimate</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 💰 TOP BAR -->
<div id="topBar">
    <div id="user">FREE USER</div>
    <div id="ad">AD SPACE</div>
</div>

<!-- 🎬 START -->
<div id="startScreen">

    <div class="prof">
        <div class="glow"></div>
        <div class="face">👨‍🏫</div>
    </div>

    <div class="speech" id="speech">SAVAŞA HAZIR MISIN?</div>

    <button onclick="startGame()">PLAY</button>
    <button onclick="upgrade()">PREMIUM</button>

</div>

<!-- 🎮 GAME -->
<div id="gameScreen" class="hidden">

    <div id="vs">YOU vs BOT</div>

    <div id="ops">
        <button onclick="setOp('+')">+</button>
        <button onclick="setOp('-')">-</button>
        <button onclick="setOp('*')">×</button>
        <button onclick="setOp('/')">÷</button>
    </div>

    <div>Main</div>
    <div id="balls"></div>

    <div>Results</div>
    <div id="results"></div>

    <div>Score: <span id="score">0</span></div>

    <button onclick="finish()">FINISH</button>

    <!-- 💬 CHAT -->
    <div id="chat">
        <div id="msgs"></div>
        <input id="input" placeholder="chat..." />
        <button onclick="send()">Send</button>
    </div>

</div>

<!-- 🏆 LEADERBOARD -->
<div id="scoreScreen" class="hidden">
    <h1>LEADERBOARD</h1>
    <div id="list"></div>
    <button onclick="back()">BACK</button>
</div>

<script src="script.js"></script>

</body>
</html>
