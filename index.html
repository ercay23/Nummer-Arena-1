<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Number Arena Core</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>NUMBER ARENA</h1>

<div id="score">Score: 0</div>

<div id="ops">
  <button onclick="setOp('+')">+</button>
  <button onclick="setOp('-')">-</button>
  <button onclick="setOp('*')">×</button>
  <button onclick="setOp('/')">÷</button>
</div>

<h3>Numbers</h3>
<div id="main"></div>

<h3>Results</h3>
<div id="res"></div>

<script src="script.js"></script>
</body>
</html>
