<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Number Arena V7</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:radial-gradient(circle at top,#0b1220,#050814);
    color:white;
    text-align:center;
}

/* 🎓 PROFESSOR (RENKLİ + GLOW) */
#prof{
    width:140px;
    margin-top:10px;
    filter:drop-shadow(0 0 15px #00e5ff);
}

/* TITLE */
h1{
    color:#00e5ff;
    margin:5px;
}

/* TARGET */
#target{
    font-size:34px;
    color:#00ffcc;
}

/* TOP CUBES */
#numbers{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

/* 🧊 REAL 3D CUBE */
.cube{
    width:85px;
    height:85px;
    margin:10px;
    font-size:28px;

    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:14px;

    cursor:pointer;

    background:linear-gradient(145deg,#2b3a55,#0b1220);

    transform:perspective(500px) rotateX(18deg) rotateY(-10deg);

    box-shadow:
        8px 8px 18px rgba(0,0,0,0.7),
        -3px -3px 10px rgba(0,229,255,0.25);

    transition:0.2s;
}

.cube:hover{
    transform:scale(1.15) rotateX(0deg) rotateY(0deg);
}

/* RESULT POOL */
#pool{
    margin-top:20px;
    padding:10px;
    background:#111827;
    min-height:110px;
    border-top:2px solid #00e5ff;
}

.poolCube{
    display:inline-block;
    width:70px;
    height:70px;
    margin:6px;

    font-size:22px;

    background:linear-gradient(145deg,#1f2937,#00e5ff33);

    border-radius:12px;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    transform:perspective(400px) rotateX(12deg);

    box-shadow:0 0 10px rgba(0,229,255,0.3);
}

.poolCube:hover{
    transform:scale(1.1);
}

/* BUTTONS */
button{
    padding:10px;
    margin:5px;
    background:#00e5ff;
    border:none;
    cursor:pointer;
    border-radius:6px;
}

#expr{
    width:85%;
    font-size:22px;
    padding:10px;
    margin-top:10px;
}

/* MODAL */
#modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    background:rgba(0,0,0,0.85);
    align-items:center;
    justify-content:center;
}

#box{
    background:#111827;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 25px #00e5ff;
}
</style>
</head>

<body>

<h1>NUMBER ARENA 🎓</h1>

<!-- 🎓 PROFESSOR (RENKLİ SVG) -->
<svg id="prof" viewBox="0 0 200 200">
<defs>
<linearGradient id="g">
<stop offset="0%" stop-color="#00e5ff"/>
<stop offset="100%" stop-color="#7c3aed"/>
</linearGradient>
</defs>

<circle cx="100" cy="80" r="50" fill="url(#g)"/>
<circle cx="85" cy="75" r="6" fill="white"/>
<circle cx="115" cy="75" r="6" fill="white"/>
<path d="M80 100 Q100 120 120 100" stroke="white" stroke-width="4" fill="none"/>
<rect x="60" y="130" width="80" height="40" fill="#00ffcc"/>
</svg>

<h2>HEDEF: <span id="target"></span></h2>

<div id="numbers"></div>

<br>

<button onclick="addOp('+')">+</button>
<button onclick="addOp('-')">-</button>
<button onclick="addOp('*')">×</button>
<button onclick="addOp('/')">÷</button>

<br>

<input id="expr" readonly>

<br>

<button onclick="calculate()">HESAPLA</button>
<button onclick="finish()">BİTİR</button>

<!-- 🧊 RESULT POOL -->
<h3>Ara Sonuçlar</h3>
<div id="pool"></div>

<!-- MODAL -->
<div id="modal">
<div id="box">
<h2>Oyun Bitti 🎯</h2>
<p id="final"></p>
<button onclick="restart()">Tekrar</button>
</div>
</div>

<script>

let nums=[];
let target=0;
let expr="";
let lastResult=0;
let pool=[];

function randomSmall(){return Math.floor(Math.random()*9)+1;}

function randomBig(){
let a=[];
for(let i=25;i<=100;i+=5)a.push(i);
return a[Math.floor(Math.random()*a.length)];
}

function newGame(){

nums=[];
for(let i=0;i<5;i++)nums.push(randomSmall());
nums.push(randomBig());

target=Math.floor(Math.random()*900)+100;

document.getElementById("target").innerText=target;

expr="";
pool=[];
document.getElementById("expr").value="";
document.getElementById("pool").innerHTML="";
document.getElementById("numbers").innerHTML="";

nums.forEach(n=>{
let d=document.createElement("div");
d.className="cube";
d.innerText=n;

d.onclick=()=>{
expr += n;
document.getElementById("expr").value=expr;
};

document.getElementById("numbers").appendChild(d);
});

}

function addOp(o){
expr += " " + o + " ";
document.getElementById("expr").value=expr;
}

function calculate(){
try{
lastResult = eval(expr);
addToPool(lastResult);
}catch{
alert("Hata");
}
}

function addToPool(val){

pool.push(val);

let c=document.createElement("div");
c.className="poolCube";
c.innerText=val;

c.onclick=()=>{
expr += val;
document.getElementById("expr").value=expr;
};

document.getElementById("pool").appendChild(c);
}

function finish(){

let diff=Math.abs(target-lastResult);

let msg="";
let score=0;

if(diff==0){msg="Mükemmel 🎯";score=20;}
else if(diff<=5){msg="İyi 🔥";score=10;}
else{msg="Devam 💪";score=5;}

document.getElementById("final").innerHTML=
msg+"<br>Sonuç:"+lastResult+"<br>Fark:"+diff+"<br>Puan:"+score;

document.getElementById("modal").style.display="flex";
}

function restart(){
document.getElementById("modal").style.display="none";
newGame();
}

newGame();

</script>

</body>
</html>
