<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Number Arena V5</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:radial-gradient(circle at top,#0b1220,#050814);
    color:white;
    text-align:center;
}

/* 🎓 PROFESSOR */
#prof{
    width:120px;
    margin-top:10px;
    filter:drop-shadow(0 0 10px #00e5ff);
}

/* TITLE */
h1{
    color:#00e5ff;
    margin:10px;
}

/* TARGET */
#target{
    font-size:34px;
    color:#00ffcc;
}

/* CUBES */
#numbers{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:15px;
}

.cube{
    width:90px;
    height:90px;
    margin:10px;
    font-size:30px;
    display:flex;
    align-items:center;
    justify-content:center;

    background:linear-gradient(145deg,#1f2937,#0b1220);
    border-radius:14px;

    cursor:pointer;

    transform:perspective(250px) rotateX(15deg);
    box-shadow:
        6px 6px 14px rgba(0,0,0,0.7),
        -3px -3px 10px rgba(0,229,255,0.15);

    transition:0.2s;
}

.cube:hover{
    transform:scale(1.15) rotateX(0deg);
}

/* OPS */
#ops button{
    padding:12px;
    margin:5px;
    font-size:20px;
    background:#00e5ff;
    border:none;
    cursor:pointer;
    border-radius:6px;
}

/* INPUT */
#expr{
    width:85%;
    font-size:22px;
    padding:10px;
    margin-top:10px;
}

/* BUTTONS */
.btn{
    padding:10px;
    margin:5px;
    background:#00e5ff;
    border:none;
    cursor:pointer;
    border-radius:6px;
}

/* MODAL */
#modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    background:rgba(0,0,0,0.85);
    align-items:center;
    justify-content:center;
}

#box{
    background:#111827;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 25px #00e5ff;
}
</style>
</head>

<body>

<h1>NUMBER ARENA 🎓</h1>

<!-- 🎓 PROFESSOR IMAGE (placeholder emoji style) -->
<div>
    <img id="prof" src="https://i.imgur.com/8QfQ9Qp.png" onerror="this.style.display='none'">
</div>

<h2>HEDEF: <span id="target"></span></h2>

<div id="numbers"></div>

<!-- ➗ OPERATORS -->
<div id="ops">
<button onclick="addOp('+')">+</button>
<button onclick="addOp('-')">-</button>
<button onclick="addOp('*')">×</button>
<button onclick="addOp('/')">÷</button>
</div>

<input id="expr" readonly>

<br>

<button class="btn" onclick="undo()">GERİ AL</button>
<button class="btn" onclick="clearAll()">SİL</button>
<button class="btn" onclick="calculate()">HESAPLA</button>
<button class="btn" onclick="finish()">BİTİR</button>

<p id="result"></p>

<!-- 🎉 MODAL -->
<div id="modal">
<div id="box">
<h2>Oyun Bitti 🎯</h2>
<p id="final"></p>
<button onclick="restart()">Tekrar Oyna</button>
</div>
</div>

<script>

let nums=[];
let target=0;
let expr="";
let history=[];

function randomSmall(){
    return Math.floor(Math.random()*9)+1;
}

function randomBig(){
    let arr=[];
    for(let i=25;i<=100;i+=5) arr.push(i);
    return arr[Math.floor(Math.random()*arr.length)];
}

function newGame(){

    nums=[];
    for(let i=0;i<5;i++) nums.push(randomSmall());
    nums.push(randomBig());

    target=Math.floor(Math.random()*900)+100;

    document.getElementById("target").innerText=target;

    let box=document.getElementById("numbers");
    box.innerHTML="";

    expr="";
    history=[];
    document.getElementById("expr").value="";

    nums.forEach(n=>{
        let d=document.createElement("div");
        d.className="cube";
        d.innerText=n;

        d.onclick=()=>{
            history.push(expr);
            expr += n;
            document.getElementById("expr").value=expr;
        };

        box.appendChild(d);
    });
}

function addOp(o){
    history.push(expr);
    expr += " " + o + " ";
    document.getElementById("expr").value=expr;
}

function undo(){
    if(history.length>0){
        expr = history.pop();
        document.getElementById("expr").value=expr;
    }
}

function clearAll(){
    history.push(expr);
    expr="";
    document.getElementById("expr").value="";
}

function calculate(){
    try{
        let r = eval(expr);
        document.getElementById("result").innerText="Sonuç: "+r;
    }catch{
        document.getElementById("result").innerText="Hata";
    }
}

function finish(){

    let r = eval(expr);
    let diff = Math.abs(target - r);

    let msg="";
    let score=0;

    if(diff==0){msg="Mükemmel 🎯"; score=20;}
    else if(diff<=5){msg="İyi 🔥"; score=10;}
    else{msg="Devam 💪"; score=5;}

    document.getElementById("final").innerHTML =
    msg + "<br>Sonuç: " + r + "<br>Fark: " + diff + "<br>Puan: " + score;

    document.getElementById("modal").style.display="flex";
}

function restart(){
    document.getElementById("modal").style.display="none";
    newGame();
}

newGame();

</script>

</body>
</html>
