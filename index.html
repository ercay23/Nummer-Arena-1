<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Number Arena</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🎬 START SCREEN -->
<div id="startScreen">

    <div id="profScene">

        <div class="profBody">
            <div class="profGlow"></div>
            <div class="profFace">👨‍🏫</div>
        </div>

        <div class="speech">SAVAŞA HAZIR MISIN?</div>

        <button onclick="startGame()">PLAY</button>

        <div id="lang">
            <button onclick="setLang('tr')">TR</button>
            <button onclick="setLang('en')">EN</button>
            <button onclick="setLang('de')">DE</button>
            <button onclick="setLang('fr')">FR</button>
        </div>

    </div>

</div>

<!-- 🎮 GAME SCREEN -->
<div id="gameScreen" class="hidden">

    <h1>NUMBER ARENA</h1>

    <div id="ops">
        <button onclick="setOp('+')">+</button>
        <button onclick="setOp('-')">-</button>
        <button onclick="setOp('*')">×</button>
        <button onclick="setOp('/')">÷</button>
    </div>

    <h2>Main Pool</h2>
    <div id="balls"></div>

    <h2>Results</h2>
    <div id="results"></div>

</div>

<script src="script.js"></script>

</body>
</html>
