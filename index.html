<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Number Arena Cube</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top,#0b1220,#050814);
    color:white;
    text-align:center;
}

h1{
    color:#00e5ff;
    margin-top:15px;
}

#numbers{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:20px;
}

.cube{
    width:80px;
    height:80px;
    margin:10px;
    background:linear-gradient(145deg,#1f2937,#111827);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    border-radius:12px;
    cursor:pointer;
    box-shadow:0 0 10px rgba(0,229,255,0.2);
    transition:0.2s;
}

.cube:hover{
    transform:scale(1.1);
}

#ops button{
    padding:12px;
    margin:5px;
    font-size:18px;
    background:#00e5ff;
    border:none;
    cursor:pointer;
}

#expr{
    margin-top:15px;
    font-size:22px;
    padding:10px;
    width:80%;
}

#result{
    margin-top:10px;
    font-size:18px;
    color:#a5f3fc;
}

#target{
    font-size:30px;
    color:#00ffcc;
}

/* 🎉 fancy modal */
#modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    background:rgba(0,0,0,0.8);
    align-items:center;
    justify-content:center;
}

#modalBox{
    background:#111827;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px #00e5ff;
}

#modalBox h2{
    color:#00e5ff;
}
</style>
</head>

<body>

<h1>NUMBER ARENA 🔷</h1>

<h2>HEDEF: <span id="target"></span></h2>

<div id="numbers"></div>

<div id="ops">
<button onclick="setOp('+')">+</button>
<button onclick="setOp('-')">-</button>
<button onclick="setOp('*')">×</button>
<button onclick="setOp('/')">÷</button>
</div>

<input id="expr" readonly placeholder="tıkla ve oluştur">

<br>

<button onclick="calculate()">HESAPLA</button>
<button onclick="finish()">BİTİR</button>

<p id="result"></p>

<!-- 🎉 MODAL -->
<div id="modal">
<div id="modalBox">
<h2>Oyun Bitti 🎯</h2>
<p id="finalText"></p>
<button onclick="restart()">Tekrar Oyna</button>
</div>
</div>

<script>

let nums=[];
let selected=null;
let op=null;
let currentExpr="";
let target=0;
let lastResult=0;

function randomSmall(){
    return Math.floor(Math.random()*9)+1;
}

function randomBig(){
    let arr=[];
    for(let i=25;i<=100;i+=5) arr.push(i);
    return arr[Math.floor(Math.random()*arr.length)];
}

function newGame(){

    nums=[];
    for(let i=0;i<5;i++) nums.push(randomSmall());
    nums.push(randomBig());

    target=Math.floor(Math.random()*900)+100;

    document.getElementById("target").innerText=target;

    let box=document.getElementById("numbers");
    box.innerHTML="";

    nums.forEach(n=>{
        let d=document.createElement("div");
        d.className="cube";
        d.innerText=n;

        d.onclick=()=>{
            currentExpr += n;
            document.getElementById("expr").value = currentExpr;
        };

        box.appendChild(d);
    });
}

function setOp(o){
    currentExpr += " " + o + " ";
    document.getElementById("expr").value = currentExpr;
}

function calculate(){
    try{
        lastResult = eval(currentExpr);
        document.getElementById("result").innerText =
        "Sonuç: " + lastResult;
    }catch{
        document.getElementById("result").innerText = "Hata";
    }
}

function finish(){

    let diff = Math.abs(target - lastResult);

    let msg="";
    let score=0;

    if(diff==0){
        msg="Mükemmel! 🎯";
        score=20;
    }else if(diff<=5){
        msg="Çok iyi! 🔥";
        score=10;
    }else{
        msg="Denemeye devam 💪";
        score=5;
    }

    document.getElementById("finalText").innerHTML =
    msg + "<br>Fark: " + diff + "<br>Puan: " + score;

    document.getElementById("modal").style.display="flex";
}

function restart(){
    document.getElementById("modal").style.display="none";
    currentExpr="";
    document.getElementById("expr").value="";
    newGame();
}

newGame();

</script>

</body>
</html>
