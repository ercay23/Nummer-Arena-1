<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Number Arena V6</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:radial-gradient(circle at top,#0b1220,#050814);
    color:white;
    text-align:center;
}

/* 🎓 PROFESSOR (GARANTİ ÇALIŞAN SVG) */
#prof{
    width:120px;
    margin-top:10px;
    filter:drop-shadow(0 0 10px #00e5ff);
}

/* TITLE */
h1{
    color:#00e5ff;
}

/* TARGET */
#target{
    font-size:34px;
    color:#00ffcc;
}

/* 3D CUBES (REAL DEPTH) */
#numbers{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:15px;
}

.cube{
    width:90px;
    height:90px;
    margin:10px;
    font-size:32px;
    display:flex;
    align-items:center;
    justify-content:center;

    background:linear-gradient(145deg,#1f2937,#0b1220);
    border-radius:14px;

    cursor:pointer;

    transform:perspective(400px) rotateX(18deg) rotateY(-8deg);
    box-shadow:
        10px 10px 20px rgba(0,0,0,0.8),
        -4px -4px 10px rgba(0,229,255,0.15);

    transition:0.2s;
}

.cube:hover{
    transform:scale(1.15) rotateX(0deg) rotateY(0deg);
}

/* OPS */
button{
    padding:10px;
    margin:5px;
    background:#00e5ff;
    border:none;
    cursor:pointer;
    border-radius:6px;
}

/* INPUT */
#expr{
    width:85%;
    font-size:22px;
    padding:10px;
    margin-top:10px;
}

/* LOG */
#log{
    margin-top:10px;
    max-width:400px;
    margin:auto;
    text-align:left;
    background:#111827;
    padding:10px;
    border-radius:10px;
}

.step{
    border-bottom:1px solid #334155;
    padding:5px;
}

/* MODAL */
#modal{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    display:none;
    background:rgba(0,0,0,0.85);
    align-items:center;
    justify-content:center;
}

#box{
    background:#111827;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 25px #00e5ff;
}
</style>
</head>

<body>

<h1>NUMBER ARENA 🎓</h1>

<!-- 🎓 PROFESSOR (SAFE INLINE SVG) -->
<svg id="prof" viewBox="0 0 200 200">
<circle cx="100" cy="80" r="50" fill="#1f2937"/>
<rect x="60" y="130" width="80" height="50" fill="#00e5ff"/>
<circle cx="85" cy="75" r="5" fill="white"/>
<circle cx="115" cy="75" r="5" fill="white"/>
<path d="M80 95 Q100 110 120 95" stroke="white" fill="none"/>
</svg>

<h2>HEDEF: <span id="target"></span></h2>

<div id="numbers"></div>

<br>

<button onclick="setOp('+')">+</button>
<button onclick="setOp('-')">-</button>
<button onclick="setOp('*')">×</button>
<button onclick="setOp('/')">÷</button>

<br>

<button onclick="build()">EKLE</button>
<button onclick="undo()">GERİ AL</button>
<button onclick="finish()">BİTİR</button>

<input id="expr" readonly>

<div id="log"></div>

<!-- MODAL -->
<div id="modal">
<div id="box">
<h2>Oyun Bitti 🎯</h2>
<p id="final"></p>
<button onclick="restart()">Tekrar Oyna</button>
</div>
</div>

<script>

let nums=[];
let target=0;
let expr="";
let history=[];
let op=null;
let current=0;

function randomSmall(){return Math.floor(Math.random()*9)+1;}

function randomBig(){
let a=[];
for(let i=25;i<=100;i+=5)a.push(i);
return a[Math.floor(Math.random()*a.length)];
}

function newGame(){

nums=[];
for(let i=0;i<5;i++)nums.push(randomSmall());
nums.push(randomBig());

target=Math.floor(Math.random()*900)+100;

document.getElementById("target").innerText=target;

let box=document.getElementById("numbers");
box.innerHTML="";

expr="";
history=[];
current=0;
document.getElementById("expr").value="";
document.getElementById("log").innerHTML="";

nums.forEach(n=>{
let d=document.createElement("div");
d.className="cube";
d.innerText=n;

d.onclick=()=>{
history.push(expr);

if(current===0){
current=n;
}else{
if(op=='+')current+=n;
if(op=='-')current-=n;
if(op=='*')current*=n;
if(op=='/')current/=n;
}

expr=current;

document.getElementById("expr").value=current;

let step=document.createElement("div");
step.className="step";
step.innerText="→ "+current;
document.getElementById("log").appendChild(step);
};

box.appendChild(d);
});

}

function setOp(o){op=o;}

function build(){}

function undo(){
if(history.length>0){
expr=history.pop();
document.getElementById("expr").value=expr;
}
}

function finish(){

let diff=Math.abs(target-current);

let msg="";
let score=0;

if(diff==0){msg="Mükemmel 🎯";score=20;}
else if(diff<=5){msg="İyi 🔥";score=10;}
else{msg="Devam 💪";score=5;}

document.getElementById("final").innerHTML=
msg+"<br>Sonuç:"+current+"<br>Fark:"+diff+"<br>Puan:"+score;

document.getElementById("modal").style.display="flex";
}

function restart(){
document.getElementById("modal").style.display="none";
newGame();
}

newGame();

</script>

</body>
</html>
