<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Number Arena V4</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:radial-gradient(circle at top,#0b1220,#050814);
    color:white;
    text-align:center;
}

h1{
    color:#00e5ff;
    margin-top:10px;
}

#game{
    display:none;
}

button{
    padding:10px;
    margin:5px;
    background:#00e5ff;
    border:none;
    cursor:pointer;
    border-radius:6px;
}

button:hover{opacity:0.8;}

.langBtn{
    background:#1f2937;
    color:white;
}

.container{
    padding:10px;
}

.cube{
    width:80px;
    height:80px;
    margin:10px;
    background:linear-gradient(145deg,#1f2937,#0b1220);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    border-radius:12px;
    cursor:pointer;
    box-shadow:
        6px 6px 12px rgba(0,0,0,0.6),
        -3px -3px 10px rgba(0,229,255,0.15);
    transform:perspective(200px) rotateX(10deg);
    transition:0.2s;
}

.cube:hover{
    transform:scale(1.1) rotateX(0deg);
}

#numbers{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

#expr{
    margin-top:10px;
    padding:10px;
    font-size:20px;
    width:80%;
}

#target{
    font-size:28px;
    color:#00ffcc;
}

#result{
    margin-top:10px;
    color:#a5f3fc;
}

#modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    background:rgba(0,0,0,0.8);
    align-items:center;
    justify-content:center;
}

#modalBox{
    background:#111827;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 20px #00e5ff;
}
</style>
</head>

<body>

<!-- 🌍 LANGUAGE -->
<div id="langScreen">
<h1>NUMBER ARENA</h1>

<button class="langBtn" onclick="start('tr')">Türkçe</button>
<button class="langBtn" onclick="start('en')">English</button>
<button class="langBtn" onclick="start('de')">Deutsch</button>
<button class="langBtn" onclick="start('es')">Español</button>
</div>

<!-- 🎮 GAME -->
<div id="game">

<h2>HEDEF: <span id="target"></span></h2>

<div id="numbers"></div>

<input id="expr" readonly placeholder="tıkla ve oluştur">

<br>

<button onclick="undo()">GERİ AL</button>
<button onclick="clearAll()">SİL</button>

<br>

<button onclick="calculate()">HESAPLA</button>
<button onclick="finish()">BİTİR</button>

<p id="result"></p>

</div>

<!-- 🎉 MODAL -->
<div id="modal">
<div id="modalBox">
<h2>Oyun Bitti 🎯</h2>
<p id="finalText"></p>
<button onclick="restart()">Tekrar Oyna</button>
</div>
</div>

<script>

let nums=[];
let target=0;
let currentExpr="";
let history=[];

function start(lang){
    document.getElementById("langScreen").style.display="none";
    document.getElementById("game").style.display="block";
    newGame();
}

function randomSmall(){
    return Math.floor(Math.random()*9)+1;
}

function randomBig(){
    let arr=[];
    for(let i=25;i<=100;i+=5) arr.push(i);
    return arr[Math.floor(Math.random()*arr.length)];
}

function newGame(){

    nums=[];
    for(let i=0;i<5;i++) nums.push(randomSmall());
    nums.push(randomBig());

    target=Math.floor(Math.random()*900)+100;

    document.getElementById("target").innerText=target;

    let box=document.getElementById("numbers");
    box.innerHTML="";

    history=[];
    currentExpr="";
    document.getElementById("expr").value="";

    nums.forEach(n=>{
        let d=document.createElement("div");
        d.className="cube";
        d.innerText=n;

        d.onclick=()=>{
            history.push(currentExpr);
            currentExpr += n;
            document.getElementById("expr").value=currentExpr;
        };

        box.appendChild(d);
    });
}

function undo(){
    if(history.length>0){
        currentExpr = history.pop();
        document.getElementById("expr").value=currentExpr;
    }
}

function clearAll(){
    history.push(currentExpr);
    currentExpr="";
    document.getElementById("expr").value="";
}

function calculate(){
    try{
        let result = eval(currentExpr);
        document.getElementById("result").innerText = "Sonuç: " + result;
    }catch{
        document.getElementById("result").innerText = "Hata";
    }
}

function finish(){

    let result = eval(currentExpr);
    let diff = Math.abs(target - result);

    let msg="";
    let score=0;

    if(diff==0){msg="Mükemmel 🎯"; score=20;}
    else if(diff<=5){msg="Çok iyi 🔥"; score=10;}
    else{msg="Devam 💪"; score=5;}

    document.getElementById("finalText").innerHTML =
    msg + "<br>Fark: " + diff + "<br>Puan: " + score;

    document.getElementById("modal").style.display="flex";
}

function restart(){
    document.getElementById("modal").style.display="none";
    newGame();
}

</script>

</body>
</html>
