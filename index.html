<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Number Arena</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌍 LANGUAGE -->
<div id="langBar">
    <button onclick="setLang('tr')">TR</button>
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('de')">DE</button>
    <button onclick="setLang('fr')">FR</button>
</div>

<!-- 🎬 START -->
<div id="startScreen">

    <!-- 👨‍🏫 PROFESSOR (Einstein style SVG) -->
    <div class="profWrap">

        <svg class="profSVG" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="85" class="head"/>
            <circle cx="70" cy="85" r="8" class="eye"/>
            <circle cx="130" cy="85" r="8" class="eye"/>
            <path d="M70 135 Q100 155 130 135" class="mouth"/>
            <path d="M40 70 Q100 20 160 70" class="hair"/>
        </svg>

    </div>

    <div class="speech" id="speech">SAVAŞA HAZIR MISIN?</div>

    <button onclick="startGame()">PLAY</button>
    <button onclick="startPremium()">PREMIUM</button>

</div>

<!-- 🎮 GAME -->
<div id="gameScreen" class="hidden">

    <h1>NUMBER ARENA</h1>

    <div id="balls"></div>
    <div id="results"></div>

</div>

<script src="script.js"></script>

</body>
</html>
